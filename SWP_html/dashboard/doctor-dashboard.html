<!DOCTYPE html>
<html lang="en" class="theme-fs-sm" data-bs-theme="light" data-bs-theme-color="default" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>KiviCare Doctor Dashboard</title>
    <link rel="shortcut icon" href="./assets/images/favicon.ico" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- CSS Libraries -->
    <link rel="stylesheet" href="./assets/css/core/libs.min.css" />
    <link rel="stylesheet" href="./assets/vendor/font-awesome/css/all.min.css" />
    <link rel="stylesheet" href="./assets/css/kivicare.min.css?v=1.4.1" />

    <!-- Custom Styles -->
    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #e3f2fd);
            font-family: 'Roboto', sans-serif;
            display: flex;
        }

        aside.sidebar {
            width: 250px;
            background: #fff;
            box-shadow: 2px 0 6px rgba(0, 0, 0, 0.1);
            min-height: 100vh;
            padding-top: 2rem;
            position: fixed;
            top: 0;
            left: 0;
        }

        .logo-main {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-main img {
            height: 40px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #333;
            transition: background 0.3s;
        }

        .sidebar-menu li.active,
        .sidebar-menu li:hover {
            background: #d6dfff;
            color: #2b4de3;
            font-weight: 600;
        }

        .sidebar-menu li i {
            margin-right: 10px;
            width: 18px;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            flex: 1;
        }

        #doctorWelcome {
            font-size: 28px;
            font-weight: 700;
            color: #1976d2;
        }

        span.mb-4 {
            font-size: 16px;
            color: #455a64;
        }

        .waitlist-table {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .waitlist-table thead {
            background-color: #e3f2fd;
            color: #0d47a1;
        }

        .waitlist-table tbody tr:hover {
            background-color: #f1f8ff;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .action-buttons .btn {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 20px;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.1s ease;
            transform: translateZ(0);
        }

        .action-buttons .btn:hover {
            filter: brightness(1.05);
            transform: scale(1.01);
        }

        .btn-info {
            background-color: #29b6f6;
            border: none;
        }

        .btn-primary {
            background-color: #1976d2;
            border: none;
        }

        .btn-secondary {
            background-color: #9e9e9e;
            border: none;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-waiting {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-inprogress {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }

        .status-skipped {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="logo-main">
            <img src="./assets/images/logo.png" alt="KiviCare logo">
        </div>
        <ul class="sidebar-menu">
            <li class="active"><i class="fas fa-th"></i> Dashboard</li>
            <li><i class="fas fa-users"></i> Patient Waitlist</li>
            <li><i class="fas fa-file-medical"></i> Medical Records</li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="text-center mb-4">
            <h1 id="doctorWelcome">Hello! Dr. Amine Louis</h1>
            <span>Have a nice day. Ready to help your patients.</span>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0">Patient Waitlist</h3>
                <button class="btn btn-sm btn-outline-primary" onclick="refreshWaitlist()">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
            <div class="card-body pt-0">
                <div class="table-responsive">
                    <table class="table waitlist-table">
                        <thead>
                            <tr>
                                <th>Patient Name</th>
                                <th>Room</th>
                                <th>Registered At</th>
                                <th>Estimated Time</th>
                                <th>Visit Type</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="waitlist-table-body"></tbody>
                    </table>
                </div>
                <div class="row mt-4">
                    <div class="col-md-6 d-flex justify-content-start">
                        <button class="btn btn-secondary me-3" id="prevPage">Previous</button>
                        <button class="btn btn-primary" id="nextPage">Next</button>
                    </div>
                    <div class="col-md-6 d-flex justify-content-end align-items-center">
                        <span id="pagination-info">Page 1 of 1</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let pageSize = 10;

        const account = JSON.parse(localStorage.getItem("account"));

        document.addEventListener('DOMContentLoaded', function () {
            checkAuthentication();
            loadWaitlist();
            setupEventListeners();
            setInterval(loadWaitlist, 30000);
        });

        function checkAuthentication() {
            document.getElementById('doctorWelcome').textContent = `Hello! Dr. ${account.username}`;
        }

        function setupEventListeners() {
            document.getElementById('prevPage').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    loadWaitlist();
                }
            });

            document.getElementById('nextPage').addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    loadWaitlist();
                }
            });
        }

        function loadWaitlist() {
            const tbody = document.getElementById('waitlist-table-body');
            tbody.style.opacity = 0;

            const url = `http://localhost:8080/SWP_back_war_exploded/api/doctor/waitlist?account_staff_id=${account.accountStaffId}&page=${currentPage}&pageSize=${pageSize}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    totalPages = data.totalPages || 1;
                    currentPage = data.currentPage || 1;
                    displayWaitlist(data.waitlistEntries || []);
                    updatePagination();
                })
                .catch(error => {
                    console.error('Load error:', error);
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">Error loading data</td></tr>';
                })
                .finally(() => {
                    tbody.style.opacity = 1;
                });
        }

        function displayWaitlist(entries) {
            const tbody = document.getElementById('waitlist-table-body');
            tbody.innerHTML = '';

            if (!entries.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">No patients in waitlist</td></tr>';
                return;
            }

            entries.forEach(entry => {
                const row = document.createElement('tr');
                const registeredAt = entry.registeredAt ? new Date(entry.registeredAt).toLocaleString() : 'N/A';
                const estimatedTime = entry.estimatedTime ? new Date(entry.estimatedTime).toLocaleString() : 'N/A';
                const statusClass = getStatusClass(entry.status);

                row.innerHTML = `
                    <td>${entry.patientName || 'Unknown'}</td>
                    <td>${entry.roomName || 'N/A'}</td>
                    <td>${registeredAt}</td>
                    <td>${estimatedTime}</td>
                    <td>${entry.visitType || 'N/A'}</td>
                    <td><span class="status-badge ${statusClass}">${entry.status || 'Unknown'}</span></td>
                    <td>${getActionButtons(entry)}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function getStatusClass(status) {
            switch (status?.toLowerCase()) {
                case 'waiting': return 'status-waiting';
                case 'inprogress': return 'status-inprogress';
                case 'completed': return 'status-completed';
                case 'skipped': return 'status-skipped';
                default: return '';
            }
        }

        function getActionButtons(entry) {
            const isInitialWaiting = entry.visitType === 'Initial' && entry.status === 'Waiting';
            let buttons = `<div class="action-buttons">
                <button class="btn btn-info" onclick="viewMedicalRecord(${entry.waitlistId}, '${entry.patientName}')">
                    <i class="fas fa-eye"></i> View Record
                </button>`;

            if (isInitialWaiting) {
                buttons += `
                <button class="btn btn-primary" onclick="diagnose(${entry.waitlistId}, '${entry.patientName}')">
                    <i class="fas fa-stethoscope"></i> Diagnose
                </button>`;
            } else if (entry.visitType === 'Initial' && entry.status !== 'Waiting') {
                buttons += `
                <button class="btn btn-secondary" onclick="viewDiagnosis(${entry.waitlistId}, '${entry.patientName}')">
                    <i class="fas fa-file-medical"></i> View Diagnosis
                </button>`;
            }

            return buttons + '</div>';
        }

        function updatePagination() {
            document.getElementById('pagination-info').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage <= 1;
            document.getElementById('nextPage').disabled = currentPage >= totalPages;
        }

        function viewMedicalRecord(waitlistId, patientName) {
            window.location.href = `./doctor-medical-record.html?waitlistId=${waitlistId}&patientName=${encodeURIComponent(patientName)}`;
        }

        function diagnose(waitlistId, patientName) {
            window.location.href = `./doctor-diagnose.html?waitlistId=${waitlistId}&patientName=${encodeURIComponent(patientName)}`;
        }

        function viewDiagnosis(waitlistId, patientName) {
            window.location.href = `./doctor-view-diagnosis.html?waitlistId=${waitlistId}&patientName=${encodeURIComponent(patientName)}`;
        }

        function refreshWaitlist() {
            loadWaitlist();
        }
    </script>
</body>

</html>
