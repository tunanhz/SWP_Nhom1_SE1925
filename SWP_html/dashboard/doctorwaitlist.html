<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Waitlist - KiviCare</title>
    <link rel="stylesheet" href="./assets/css/core/libs.min.css">
    <link rel="stylesheet" href="./assets/vendor/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/kivicare.min.css?v=1.4.1">
    <link rel="stylesheet" href="./assets/css/custom.min.css?v=1.4.1">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fbfc;
        }

        .card {
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            margin-top: 20px;
        }

        .card-header {
            background: #ffffff;
            border-bottom: 1px solid #eee;
            padding: 20px 24px;
        }

        .card-body {
            padding: 24px;
        }

        .filter-section {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-waiting {
            background-color: #ffeeba;
            color: #856404;
        }

        .status-inprogress {
            background-color: #bee5eb;
            color: #0c5460;
        }

        .status-completed {
            background-color: #c3e6cb;
            color: #155724;
        }

        .status-skipped {
            background-color: #f5c6cb;
            color: #721c24;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85rem;
        }

        table thead {
            background-color: #0d6efd;
            color: white;
        }

        table tr td, table tr th {
            vertical-align: middle;
        }

        .btn {
            transition: background-color 0.3s ease, transform 0.1s ease;
            transform: translateZ(0);
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: scale(1.01);
        }
    </style>
</head>

<body>
    <main class="container">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Patient Waitlist</h4>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-primary btn-sm" onclick="refreshWaitlist()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="window.location.href='./doctor-dashboard.html'">
                        <i class="fas fa-arrow-left"></i> Dashboard
                    </button>
                </div>
            </div>

            <div class="card-body">
                <div class="filter-section row g-3">
                    <div class="col-md-3">
                        <label for="statusFilter" class="form-label">Status</label>
                        <select id="statusFilter" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="">All</option>
                            <option value="Waiting">Waiting</option>
                            <option value="InProgress">In Progress</option>
                            <option value="Completed">Completed</option>
                            <option value="Skipped">Skipped</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="visitTypeFilter" class="form-label">Visit Type</label>
                        <select id="visitTypeFilter" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="">All</option>
                            <option value="Initial">Initial</option>
                            <option value="Result">Result</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="sortBy" class="form-label">Sort by</label>
                        <select id="sortBy" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="waitlist_id">ID</option>
                            <option value="registered_at">Registered</option>
                            <option value="estimated_time">Estimated</option>
                            <option value="status">Status</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label for="sortOrder" class="form-label">Order</label>
                        <select id="sortOrder" class="form-select form-select-sm" onchange="applyFilters()">
                            <option value="ASC">Ascending</option>
                            <option value="DESC">Descending</option>
                        </select>
                    </div>
                </div>

                <div class="table-responsive mt-4">
                    <table class="table table-bordered table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Patient</th>
                                <th>Room</th>
                                <th>Registered</th>
                                <th>Estimated</th>
                                <th>Visit Type</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="waitlist-table-body">
                            <!-- JS renders rows -->
                        </tbody>
                    </table>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <span id="pagination-info">Page 1 of 1</span>
                    <div>
                        <button class="btn btn-secondary btn-sm" id="prevPage">&laquo; Previous</button>
                        <button class="btn btn-primary btn-sm" id="nextPage">Next &raquo;</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="./assets/js/core/libs.min.js"></script>
    <script src="./assets/js/kivicare.js"></script>
    <script>
        // Retain existing JS logic here.
    </script>
</body>

</html>
