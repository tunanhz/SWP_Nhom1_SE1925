<!DOCTYPE html>
<html lang="en" class="theme-fs-sm" data-bs-theme="light" data-bs-theme-color="default" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Diagnosis - KiviCare</title>
    <link rel="shortcut icon" href="./assets/images/favicon.ico" />
    <link rel="stylesheet" href="./assets/css/core/libs.min.css" />
    <link rel="stylesheet" href="./assets/vendor/flaticon/css/flaticon.css" />
    <link rel="stylesheet" href="./assets/vendor/font-awesome/css/all.min.css" />
    <link rel="stylesheet" href="./assets/vendor/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="./assets/css/kivicare.min.css?v=1.4.1" />
    <link rel="stylesheet" href="./assets/css/custom.min.css?v=1.4.1" />
    <link rel="stylesheet" href="./assets/css/rtl.min.css?v=1.4.1" />
    <link rel="stylesheet" href="./assets/css/customizer.min.css?v=1.4.1" />
    <style>
        .filter-section { background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        #medicineRecordId { font-family: 'Courier New', monospace; font-size: 0.9em; }
        #medicalRecordInfo { font-style: italic; color: #6c757d; }
        #selectedPatientName { background-color: #f8f9fa; }
        .patient-info-card {
            border: 1px solid #dee2e6;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .patient-info-card strong {
            color: #495057;
        }
        .medical-record-option {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
        }
        /* Read-only field styling */
        .form-control:disabled, .form-select:disabled {
            background-color: #f8f9fa;
            border-color: #dee2e6;
            color: #6c757d;
            cursor: not-allowed;
        }
        .readonly-field-label {
            color: #6c757d;
            font-style: italic;
        }
        .edit-mode-notice {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="full-screen">
    <main class="main-content">
        <div class="content-inner container-fluid pb-0" id="page_layout">
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h4 class="mb-0">Diagnosis</h4>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-success" onclick="showCreateModal()">
                                    <i class="fas fa-plus"></i> Create Diagnosis
                                </button>
                                <button class="btn btn-sm btn-outline-primary" onclick="refreshDiagnosis()">
                                    <i class="fas fa-sync-alt"></i> Refresh
                                </button>
                                <button class="btn btn-sm btn-primary" onclick="window.location.href='./doctor-dashboard.html'">
                                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="filter-section">
                                <div class="row">
                                    <div class="col-md-4">
                                        <label for="typeFilter" class="form-label">Filter by Type:</label>
                                        <select class="form-select" id="typeFilter" onchange="applyFilters()">
                                            <option value="">All Types</option>
                                            <option value="Initial">Initial</option>
                                            <option value="Follow-up">Follow-up</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="statusFilter" class="form-label">Filter by Status:</label>
                                        <select class="form-select" id="statusFilter" onchange="applyFilters()">
                                            <option value="">All Statuses</option>
                                            <option value="Pending">Pending</option>
                                            <option value="Confirmed">Confirmed</option>
                                            <option value="Resolved">Resolved</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="sortBy" class="form-label">Sort by:</label>
                                        <select class="form-select" id="sortBy" onchange="applyFilters()">
                                            <option value="diagnosis_id">Diagnosis ID</option>
                                            <option value="date">Date</option>
                                            <option value="type">Type</option>
                                            <option value="status">Status</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-striped">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>Patient Name</th>
                                            <th>Date</th>
                                            <th>Type</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="diagnosis-table-body">
                                        <!-- Data will be populated by JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <div>
                                    <span id="pagination-info">Page 1 of 1</span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-secondary" id="prevPage"><i class="fas fa-chevron-left"></i> Previous</button>
                                    <button class="btn btn-primary" id="nextPage">Next <i class="fas fa-chevron-right"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create/Edit Diagnosis Modal -->
    <div class="modal fade" id="diagnosisModal" tabindex="-1" aria-labelledby="diagnosisModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="diagnosisModalLabel">Create Diagnosis</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Edit mode notice -->
                    <div id="editModeNotice" class="edit-mode-notice" style="display: none;">
                        <i class="fas fa-info-circle"></i>
                        <strong>Edit Mode:</strong> Medical record and patient information cannot be changed when editing a diagnosis.
                    </div>

                    <form id="diagnosisForm">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="mb-3">
                                    <label for="medicineRecordId" class="form-label">Medical Record <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <select class="form-select" id="medicineRecordId" required>
                                            <option value="">Select a medical record...</option>
                                        </select>
                                        <button class="btn btn-outline-secondary" type="button" onclick="refreshMedicalRecords()" title="Refresh medical records list">
                                            <i class="fas fa-sync-alt"></i>
                                        </button>
                                    </div>
                                    <div class="form-text">
                                        <small id="medicalRecordInfo" class="text-muted"></small>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="disease" class="form-label">Disease <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="disease" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="selectedPatientName" class="form-label">Patient Name</label>
                                    <input type="text" class="form-control" id="selectedPatientName" readonly>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="conclusion" class="form-label">Conclusion</label>
                            <textarea class="form-control" id="conclusion" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="treatmentPlan" class="form-label">Treatment Plan</label>
                            <textarea class="form-control" id="treatmentPlan" rows="4"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveDiagnosis()">Save Diagnosis</button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Diagnosis Details Modal -->
    <div class="modal fade" id="viewDiagnosisModal" tabindex="-1" aria-labelledby="viewDiagnosisModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="viewDiagnosisModalLabel">Diagnosis Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="diagnosisDetails">
                        <!-- Diagnosis details will be populated here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this diagnosis? This action cannot be undone.</p>
                    <div id="deleteDiagnosisInfo"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/core/libs.min.js"></script>
    <script src="./assets/vendor/flatpickr/dist/flatpickr.min.js"></script>
    <script src="./assets/js/kivicare.js" defer></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let pageSize = 10;
        let currentDiagnosisId = null;
        let isEditMode = false;
        let medicalRecords = []; // Store loaded medical records

        // Get doctorId from localStorage or URL parameter
        function getDoctorId() {
            // Try to get from localStorage first
            const account = localStorage.getItem('account');
            if (account) {
                try {
                    const accountData = JSON.parse(account);
                    if (accountData.accountStaffId) {
                        return accountData.accountStaffId;
                    }
                } catch (e) {
                    console.error('Error parsing account data:', e);
                }
            }

            // Fallback to URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const doctorId = urlParams.get('doctorId');
            if (doctorId) {
                return doctorId;
            }

            // Default fallback (you may want to redirect to login instead)
            console.warn('No doctorId found, using default value 1');
            return 1;
        }

        // Load medical records for dropdown
        function loadMedicalRecords() {
            const doctorId = getDoctorId();
            return fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/medical-records?doctorId=${doctorId}&page=1&pageSize=100`)
                .then(response => response.json())
                .then(data => {
                    medicalRecords = data.records || [];
                    populateMedicalRecordsDropdown();
                    return medicalRecords;
                })
                .catch(error => {
                    console.error('Error loading medical records:', error);
                    medicalRecords = [];
                    return [];
                });
        }

        // Refresh medical records list
        function refreshMedicalRecords() {
            const refreshButton = document.querySelector('button[onclick="refreshMedicalRecords()"]');
            const originalHtml = refreshButton.innerHTML;
            refreshButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            refreshButton.disabled = true;

            loadMedicalRecords().then(() => {
                refreshButton.innerHTML = originalHtml;
                refreshButton.disabled = false;

                // Show success message briefly
                const infoField = document.getElementById('medicalRecordInfo');
                const originalInfo = infoField.innerHTML;
                infoField.innerHTML = '<span class="text-success">Medical records refreshed successfully!</span>';
                setTimeout(() => {
                    infoField.innerHTML = originalInfo;
                }, 2000);
            }).catch(error => {
                refreshButton.innerHTML = originalHtml;
                refreshButton.disabled = false;
                alert('Error refreshing medical records: ' + error.message);
            });
        }

        // Populate medical records dropdown
        function populateMedicalRecordsDropdown() {
            const select = document.getElementById('medicineRecordId');
            select.innerHTML = '<option value="">Select a medical record...</option>';

            medicalRecords.forEach(record => {
                const option = document.createElement('option');
                option.value = record.recordId;

                // Enhanced display with patient information
                const patientAge = record.patientDob ? calculateAge(record.patientDob) : 'N/A';
                const displayText = `#${record.recordId} - ${record.patientName} (${record.patientGender}, ${patientAge}y) - ${record.date}`;
                option.textContent = displayText;

                // Store all patient data as attributes
                option.setAttribute('data-patient-id', record.patientId);
                option.setAttribute('data-patient-name', record.patientName);
                option.setAttribute('data-patient-dob', record.patientDob);
                option.setAttribute('data-patient-gender', record.patientGender);
                option.setAttribute('data-patient-phone', record.patientPhone);
                option.setAttribute('data-patient-address', record.patientAddress);
                option.setAttribute('data-date', record.date);
                option.setAttribute('data-type', record.type);
                option.setAttribute('data-status', record.status);
                select.appendChild(option);
            });
        }

        // Calculate age from date of birth
        function calculateAge(dobString) {
            if (!dobString) return 'N/A';
            const dob = new Date(dobString);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const monthDiff = today.getMonth() - dob.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
                age--;
            }
            return age;
        }

        // Handle medical record selection
        function handleMedicalRecordSelection() {
            const select = document.getElementById('medicineRecordId');
            const selectedOption = select.options[select.selectedIndex];
            const patientNameField = document.getElementById('selectedPatientName');
            const infoField = document.getElementById('medicalRecordInfo');

            if (selectedOption.value) {
                const patientName = selectedOption.getAttribute('data-patient-name');
                const patientDob = selectedOption.getAttribute('data-patient-dob');
                const patientGender = selectedOption.getAttribute('data-patient-gender');
                const patientPhone = selectedOption.getAttribute('data-patient-phone');
                const patientAddress = selectedOption.getAttribute('data-patient-address');
                const date = selectedOption.getAttribute('data-date');
                const type = selectedOption.getAttribute('data-type');
                const status = selectedOption.getAttribute('data-status');

                patientNameField.value = patientName;

                // Enhanced patient information display
                const age = patientDob ? calculateAge(patientDob) : 'N/A';
                const infoText = `
                    Patient: ${patientName} | Age: ${age} | Gender: ${patientGender || 'N/A'} |
                    Phone: ${patientPhone || 'N/A'} | Record Date: ${date} | Type: ${type} | Status: ${status}
                `.trim();

                infoField.innerHTML = `
                    <div class="patient-info-card p-2 bg-light rounded">
                        <div class="row">
                            <div class="col-md-6">
                                <strong>Patient:</strong> ${patientName}<br>
                                <strong>Age:</strong> ${age} years<br>
                                <strong>Gender:</strong> ${patientGender || 'N/A'}
                            </div>
                            <div class="col-md-6">
                                <strong>Phone:</strong> ${patientPhone || 'N/A'}<br>
                                <strong>Record Date:</strong> ${date}<br>
                                <strong>Type:</strong> ${type} | <strong>Status:</strong> ${status}
                            </div>
                        </div>
                        ${patientAddress ? `<div class="mt-2"><strong>Address:</strong> ${patientAddress}</div>` : ''}
                    </div>
                `;
            } else {
                patientNameField.value = '';
                infoField.innerHTML = '';
            }
        }

        // CRUD Operations
        function showCreateModal() {
            isEditMode = false;
            currentDiagnosisId = null;
            document.getElementById('diagnosisModalLabel').textContent = 'Create Diagnosis';
            document.getElementById('diagnosisForm').reset();
            document.getElementById('selectedPatientName').value = '';
            document.getElementById('medicalRecordInfo').innerHTML = '';

            // Enable all fields for create mode
            document.getElementById('medicineRecordId').disabled = false;
            document.getElementById('selectedPatientName').disabled = false;

            // Hide edit mode notice
            document.getElementById('editModeNotice').style.display = 'none';

            // Enable refresh button for create mode
            const refreshButton = document.querySelector('button[onclick="refreshMedicalRecords()"]');
            if (refreshButton) {
                refreshButton.disabled = false;
                refreshButton.title = "Refresh medical records list";
            }

            // Load medical records before showing modal
            loadMedicalRecords().then(() => {
                new bootstrap.Modal(document.getElementById('diagnosisModal')).show();
            });
        }

        function editDiagnosis(diagnosisId) {
            isEditMode = true;
            currentDiagnosisId = diagnosisId;
            document.getElementById('diagnosisModalLabel').textContent = 'Edit Diagnosis';

            // Load medical records first, then fetch diagnosis details
            loadMedicalRecords().then(() => {
                // Fetch diagnosis details and populate form
                fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/diagnosis/${diagnosisId}`)
                    .then(response => response.json())
                    .then(diagnosis => {
                        // Set medical record (read-only in edit mode)
                        document.getElementById('medicineRecordId').value = diagnosis.medicineRecordId;
                        document.getElementById('medicineRecordId').disabled = true; // Make read-only

                        // Set other fields (editable)
                        document.getElementById('disease').value = diagnosis.disease || '';
                        document.getElementById('conclusion').value = diagnosis.conclusion || '';
                        document.getElementById('treatmentPlan').value = diagnosis.treatmentPlan || '';

                        // Update patient name and info based on selected medical record
                        handleMedicalRecordSelection();

                        // Make patient name read-only in edit mode
                        document.getElementById('selectedPatientName').disabled = true;

                        // Show edit mode notice
                        document.getElementById('editModeNotice').style.display = 'block';

                        // Disable refresh button in edit mode
                        const refreshButton = document.querySelector('button[onclick="refreshMedicalRecords()"]');
                        if (refreshButton) {
                            refreshButton.disabled = true;
                            refreshButton.title = "Medical record cannot be changed when editing";
                        }

                        new bootstrap.Modal(document.getElementById('diagnosisModal')).show();
                    })
                    .catch(error => {
                        console.error('Error fetching diagnosis details:', error);
                        alert('Error loading diagnosis details');
                    });
            });
        }

        function saveDiagnosis() {
            const medicineRecordId = document.getElementById('medicineRecordId').value;
            const disease = document.getElementById('disease').value;
            const conclusion = document.getElementById('conclusion').value;
            const treatmentPlan = document.getElementById('treatmentPlan').value;

            if (!medicineRecordId || medicineRecordId <= 0) {
                alert('Please select a medical record');
                return;
            }

            if (!disease.trim()) {
                alert('Please enter a disease');
                return;
            }

            // In edit mode, we don't allow changing medical record
            // But we still need to send it for validation purposes
            const diagnosisData = {
                doctorId: getDoctorId(),
                medicineRecordId: parseInt(medicineRecordId),
                disease: disease.trim(),
                conclusion: conclusion.trim(),
                treatmentPlan: treatmentPlan.trim()
            };

            // Add validation message for edit mode
            if (isEditMode) {
                console.log('Edit mode: Medical record ID cannot be changed, maintaining:', medicineRecordId);
            }

            const url = isEditMode
                ? `http://localhost:8080/SWP_back_war_exploded/api/doctor/diagnosis/${currentDiagnosisId}`
                : 'http://localhost:8080/SWP_back_war_exploded/api/doctor/diagnosis';

            const method = isEditMode ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(diagnosisData)
            })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(errorData => {
                        throw new Error(errorData.error || `HTTP ${response.status}: ${response.statusText}`);
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    alert(isEditMode ? 'Diagnosis updated successfully!' : 'Diagnosis created successfully!');
                    bootstrap.Modal.getInstance(document.getElementById('diagnosisModal')).hide();
                    loadDiagnosis();
                }
            })
            .catch(error => {
                console.error('Error saving diagnosis:', error);

                // Provide specific error messages based on the error type
                let errorMessage = 'Error saving diagnosis';
                if (error.message.includes('does not have access')) {
                    errorMessage = 'Access denied: You do not have permission to access this medical record.';
                } else if (error.message.includes('not found')) {
                    errorMessage = 'The specified medical record or diagnosis was not found.';
                } else if (error.message.includes('does not have permission')) {
                    errorMessage = 'Permission denied: You cannot modify this diagnosis.';
                } else if (error.message.includes('Medical record cannot be changed')) {
                    errorMessage = 'Business rule violation: Medical record cannot be changed when updating a diagnosis.';
                } else if (error.message) {
                    errorMessage = error.message;
                }

                alert(errorMessage);
            });
        }

        function viewDiagnosis(diagnosisId) {
            fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/diagnosis/${diagnosisId}`)
                .then(response => response.json())
                .then(diagnosis => {
                    const detailsHtml = `
                        <div class="row">
                            <div class="col-md-6">
                                <strong>Diagnosis ID:</strong> ${diagnosis.diagnosisId}
                            </div>
                            <div class="col-md-6">
                                <strong>Doctor ID:</strong> ${diagnosis.doctorId}
                            </div>
                            <div class="col-md-6">
                                <strong>Medical Record ID:</strong> ${diagnosis.medicineRecordId}
                            </div>
                            <div class="col-md-6">
                                <strong>Disease:</strong> ${diagnosis.disease || 'N/A'}
                            </div>
                        </div>
                        <div class="mt-3">
                            <strong>Conclusion:</strong>
                            <p class="mt-1">${diagnosis.conclusion || 'No conclusion provided'}</p>
                        </div>
                        <div class="mt-3">
                            <strong>Treatment Plan:</strong>
                            <p class="mt-1">${diagnosis.treatmentPlan || 'No treatment plan provided'}</p>
                        </div>
                    `;
                    document.getElementById('diagnosisDetails').innerHTML = detailsHtml;
                    new bootstrap.Modal(document.getElementById('viewDiagnosisModal')).show();
                })
                .catch(error => {
                    console.error('Error fetching diagnosis details:', error);
                    alert('Error loading diagnosis details');
                });
        }

        function deleteDiagnosis(diagnosisId) {
            currentDiagnosisId = diagnosisId;
            document.getElementById('deleteDiagnosisInfo').innerHTML = `<strong>Diagnosis ID:</strong> ${diagnosisId}`;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        function confirmDelete() {
            fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/diagnosis/${currentDiagnosisId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    alert('Diagnosis deleted successfully!');
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadDiagnosis();
                }
            })
            .catch(error => {
                console.error('Error deleting diagnosis:', error);
                alert('Error deleting diagnosis');
            });
        }

        function loadDiagnosis() {
            const doctorId = getDoctorId();
            fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/diagnosis?doctorId=${doctorId}&page=${currentPage}&pageSize=${pageSize}`)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('diagnosis-table-body');
                    tbody.innerHTML = '';
                    if (data && data.diagnosis && data.diagnosis.length > 0) {
                        data.diagnosis.forEach(d => {
                            tbody.innerHTML += `<tr>
                                <td>${d.diagnosisId}</td>
                                <td>${d.patientName}</td>
                                <td>${d.date}</td>
                                <td>${d.type}</td>
                                <td>${d.status}</td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <button class='btn btn-sm btn-info' onclick='viewDiagnosis(${d.diagnosisId})' title='View Details'>
                                            <i class='fas fa-eye'></i>
                                        </button>
                                        <button class='btn btn-sm btn-warning' onclick='editDiagnosis(${d.diagnosisId})' title='Edit'>
                                            <i class='fas fa-edit'></i>
                                        </button>
                                        <button class='btn btn-sm btn-danger' onclick='deleteDiagnosis(${d.diagnosisId})' title='Delete'>
                                            <i class='fas fa-trash'></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                        });
                        totalPages = data.totalPages || 1;
                        document.getElementById('pagination-info').textContent = `Page ${currentPage} of ${totalPages}`;
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6">No diagnosis found.</td></tr>';
                    }
                })
                .catch((error) => {
                    console.error('Error loading diagnosis:', error);
                    document.getElementById('diagnosis-table-body').innerHTML = '<tr><td colspan="6">Failed to load diagnosis.</td></tr>';
                });
        }
        function refreshDiagnosis() { loadDiagnosis(); }
        function applyFilters() { loadDiagnosis(); }
        document.getElementById('prevPage').onclick = function() { if (currentPage > 1) { currentPage--; loadDiagnosis(); } };
        document.getElementById('nextPage').onclick = function() { if (currentPage < totalPages) { currentPage++; loadDiagnosis(); } };

        // Add event listener for medical record selection
        document.addEventListener('DOMContentLoaded', function() {
            loadDiagnosis();

            // Add change event listener to medical record dropdown
            document.getElementById('medicineRecordId').addEventListener('change', handleMedicalRecordSelection);
        });
    </script>
</body>
</html>
