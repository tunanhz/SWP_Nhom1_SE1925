<!DOCTYPE html>
<html lang="en" class="theme-fs-sm" data-bs-theme="light" data-bs-theme-color="default" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Medical Records - KiviCare</title>
    <link rel="shortcut icon" href="./assets/images/favicon.ico" />
    <link rel="stylesheet" href="./assets/css/core/libs.min.css" />
    <link rel="stylesheet" href="./assets/vendor/flaticon/css/flaticon.css" />
    <link rel="stylesheet" href="./assets/vendor/font-awesome/css/all.min.css" />
    <link rel="stylesheet" href="./assets/vendor/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="./assets/css/kivicare.min.css?v=1.4.1" />
    <link rel="stylesheet" href="./assets/css/custom.min.css?v=1.4.1" />
    <link rel="stylesheet" href="./assets/css/rtl.min.css?v=1.4.1" />
    <link rel="stylesheet" href="./assets/css/customizer.min.css?v=1.4.1" />
    <style>
        .filter-section { background-color: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .medical-record-details .table td { padding: 0.25rem 0.5rem; }
        .medical-record-details .card-header { font-size: 1.1em; }
        .medical-record-details h6 { margin-bottom: 0.75rem; border-bottom: 1px solid #dee2e6; padding-bottom: 0.25rem; }
        .medical-record-details .badge { font-size: 0.8em; }
    </style>
</head>
<body class="full-screen">
    <main class="main-content">
        <div class="content-inner container-fluid pb-0" id="page_layout">
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h4 class="mb-0">Medical Records</h4>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-success" onclick="showCreateModal()">
                                    <i class="fas fa-plus"></i> Create Record
                                </button>
                                <button class="btn btn-sm btn-outline-primary" onclick="refreshRecords()">
                                    <i class="fas fa-sync-alt"></i> Refresh
                                </button>
                                <button class="btn btn-sm btn-primary" onclick="window.location.href='./doctor-dashboard.html'">
                                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="filter-section">
                                <div class="row">
                                    <div class="col-md-4">
                                        <label for="typeFilter" class="form-label">Filter by Type:</label>
                                        <select class="form-select" id="typeFilter" onchange="applyFilters()">
                                            <option value="">All Types</option>
                                            <option value="Lab">Lab</option>
                                            <option value="Imaging">Imaging</option>
                                            <option value="Consultation">Consultation</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="statusFilter" class="form-label">Filter by Status:</label>
                                        <select class="form-select" id="statusFilter" onchange="applyFilters()">
                                            <option value="">All Statuses</option>
                                            <option value="Active">Active</option>
                                            <option value="Archived">Archived</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label for="sortBy" class="form-label">Sort by:</label>
                                        <select class="form-select" id="sortBy" onchange="applyFilters()">
                                            <option value="record_id">Record ID</option>
                                            <option value="date">Date</option>
                                            <option value="type">Type</option>
                                            <option value="status">Status</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="table-responsive">
                                <table class="table table-striped">
                                    <thead class="table-dark">
                                        <tr>
                                            <th>ID</th>
                                            <th>Patient Name</th>
                                            <th>Date</th>
                                            <th>Type</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="records-table-body">
                                        <!-- Data will be populated by JavaScript -->
                                    </tbody>
                                </table>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mt-3">
                                <div>
                                    <span id="pagination-info">Page 1 of 1</span>
                                </div>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-secondary" id="prevPage"><i class="fas fa-chevron-left"></i> Previous</button>
                                    <button class="btn btn-primary" id="nextPage">Next <i class="fas fa-chevron-right"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create/Edit Medical Record Modal -->
    <div class="modal fade" id="recordModal" tabindex="-1" aria-labelledby="recordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="recordModalLabel">Create Medical Record</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="recordForm">
                        <div class="mb-3">
                            <label for="patientId" class="form-label">Patient ID <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="patientId" required>
                            <div class="form-text">Enter the patient ID for this medical record</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveRecord()">Save Record</button>
                </div>
            </div>
        </div>
    </div>

    <!-- View Medical Record Details Modal -->
    <div class="modal fade" id="viewRecordModal" tabindex="-1" aria-labelledby="viewRecordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="viewRecordModalLabel">Medical Record Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body medical-record-details">
                    <div id="recordDetails">
                        <!-- Record details will be populated here -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteModalLabel">Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Are you sure you want to delete this medical record? This action cannot be undone.</p>
                    <div id="deleteRecordInfo"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/core/libs.min.js"></script>
    <script src="./assets/vendor/flatpickr/dist/flatpickr.min.js"></script>
    <script src="./assets/js/kivicare.js" defer></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let pageSize = 10;
        let currentRecordId = null;
        let isEditMode = false;

        // Get doctorId from localStorage or URL parameter
        function getDoctorId() {
            // Try to get from localStorage first
            const account = localStorage.getItem('account');
            if (account) {
                try {
                    const accountData = JSON.parse(account);
                    if (accountData.accountStaffId) {
                        return accountData.accountStaffId;
                    }
                } catch (e) {
                    console.error('Error parsing account data:', e);
                }
            }

            // Fallback to URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const doctorId = urlParams.get('doctorId');
            if (doctorId) {
                return doctorId;
            }

            // Default fallback (you may want to redirect to login instead)
            console.warn('No doctorId found, using default value 1');
            return 1;
        }

        // CRUD Operations
        function showCreateModal() {
            isEditMode = false;
            currentRecordId = null;
            document.getElementById('recordModalLabel').textContent = 'Create Medical Record';
            document.getElementById('recordForm').reset();
            new bootstrap.Modal(document.getElementById('recordModal')).show();
        }

        function editRecord(recordId) {
            isEditMode = true;
            currentRecordId = recordId;
            document.getElementById('recordModalLabel').textContent = 'Edit Medical Record';

            // Fetch record details and populate form
            fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/medical-records/${recordId}`)
                .then(response => response.json())
                .then(record => {
                    document.getElementById('patientId').value = record.patientId;
                    new bootstrap.Modal(document.getElementById('recordModal')).show();
                })
                .catch(error => {
                    console.error('Error fetching record details:', error);
                    alert('Error loading record details');
                });
        }

        function saveRecord() {
            const patientId = document.getElementById('patientId').value;

            if (!patientId || patientId <= 0) {
                alert('Please enter a valid Patient ID');
                return;
            }

            const recordData = {
                patientId: parseInt(patientId)
            };

            const url = isEditMode
                ? `http://localhost:8080/SWP_back_war_exploded/api/doctor/medical-records/${currentRecordId}`
                : 'http://localhost:8080/SWP_back_war_exploded/api/doctor/medical-records';

            const method = isEditMode ? 'PUT' : 'POST';

            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(recordData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    alert(isEditMode ? 'Record updated successfully!' : 'Record created successfully!');
                    bootstrap.Modal.getInstance(document.getElementById('recordModal')).hide();
                    loadRecords();
                }
            })
            .catch(error => {
                console.error('Error saving record:', error);
                alert('Error saving record');
            });
        }

        // Calculate age from date of birth
        function calculateAge(dobString) {
            if (!dobString) return 'N/A';
            const dob = new Date(dobString);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const monthDiff = today.getMonth() - dob.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
                age--;
            }
            return age;
        }

        function viewRecord(recordId) {
            fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/medical-records/${recordId}`)
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(errorData => {
                            throw new Error(errorData.error || `HTTP ${response.status}: ${response.statusText}`);
                        });
                    }
                    return response.json();
                })
                .then(record => {
                    const age = record.patientDob ? calculateAge(record.patientDob) : 'N/A';
                    const detailsHtml = `
                        <div class="card">
                            <div class="card-header bg-primary text-white">
                                <h6 class="mb-0"><i class="fas fa-file-medical"></i> Medical Record #${record.recordId}</h6>
                            </div>
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-6">
                                        <h6 class="text-primary"><i class="fas fa-user"></i> Patient Information</h6>
                                        <table class="table table-sm table-borderless">
                                            <tr>
                                                <td><strong>Name:</strong></td>
                                                <td>${record.patientName || 'N/A'}</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Age:</strong></td>
                                                <td>${age} years</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Gender:</strong></td>
                                                <td>${record.patientGender || 'N/A'}</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Phone:</strong></td>
                                                <td>${record.patientPhone || 'N/A'}</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Date of Birth:</strong></td>
                                                <td>${record.patientDob || 'N/A'}</td>
                                            </tr>
                                        </table>
                                    </div>
                                    <div class="col-md-6">
                                        <h6 class="text-success"><i class="fas fa-clipboard-list"></i> Record Information</h6>
                                        <table class="table table-sm table-borderless">
                                            <tr>
                                                <td><strong>Record ID:</strong></td>
                                                <td>#${record.recordId}</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Patient ID:</strong></td>
                                                <td>#${record.patientId}</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Record Date:</strong></td>
                                                <td>${record.date || 'N/A'}</td>
                                            </tr>
                                            <tr>
                                                <td><strong>Type:</strong></td>
                                                <td><span class="badge bg-info">${record.type || 'N/A'}</span></td>
                                            </tr>
                                            <tr>
                                                <td><strong>Status:</strong></td>
                                                <td><span class="badge ${getStatusBadgeClass(record.status)}">${record.status || 'N/A'}</span></td>
                                            </tr>
                                        </table>
                                    </div>
                                </div>
                                ${record.patientAddress ? `
                                <div class="row mt-3">
                                    <div class="col-12">
                                        <h6 class="text-secondary"><i class="fas fa-map-marker-alt"></i> Address</h6>
                                        <p class="text-muted">${record.patientAddress}</p>
                                    </div>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                    document.getElementById('recordDetails').innerHTML = detailsHtml;
                    new bootstrap.Modal(document.getElementById('viewRecordModal')).show();
                })
                .catch(error => {
                    console.error('Error fetching record details:', error);

                    // Provide specific error messages
                    let errorMessage = 'Error loading record details';
                    if (error.message.includes('not found')) {
                        errorMessage = 'Medical record not found.';
                    } else if (error.message.includes('doctorId parameter is required')) {
                        errorMessage = 'Access denied: Doctor authentication required.';
                    } else if (error.message) {
                        errorMessage = error.message;
                    }

                    alert(errorMessage);
                });
        }

        // Helper function to get appropriate badge class for status
        function getStatusBadgeClass(status) {
            switch(status?.toLowerCase()) {
                case 'completed': return 'bg-success';
                case 'active': return 'bg-primary';
                case 'in progress': return 'bg-warning';
                case 'pending': return 'bg-secondary';
                default: return 'bg-secondary';
            }
        }

        function deleteRecord(recordId) {
            currentRecordId = recordId;
            document.getElementById('deleteRecordInfo').innerHTML = `<strong>Record ID:</strong> ${recordId}`;
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }

        function confirmDelete() {
            fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/medical-records/${currentRecordId}`, {
                method: 'DELETE'
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    alert('Record deleted successfully!');
                    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
                    loadRecords();
                }
            })
            .catch(error => {
                console.error('Error deleting record:', error);
                alert('Error deleting record');
            });
        }

        function loadRecords() {
            const doctorId = getDoctorId();
            fetch(`http://localhost:8080/SWP_back_war_exploded/api/doctor/medical-records?doctorId=${doctorId}&page=${currentPage}&pageSize=${pageSize}`)
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('records-table-body');
                    tbody.innerHTML = '';
                    if (data && data.records && data.records.length > 0) {
                        data.records.forEach(r => {
                            tbody.innerHTML += `<tr>
                                <td>${r.recordId}</td>
                                <td>${r.patientName}</td>
                                <td>${r.date}</td>
                                <td>${r.type}</td>
                                <td>${r.status}</td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <button class='btn btn-sm btn-info' onclick='viewRecord(${r.recordId})' title='View Details'>
                                            <i class='fas fa-eye'></i>
                                        </button>
                                        <button class='btn btn-sm btn-warning' onclick='editRecord(${r.recordId})' title='Edit'>
                                            <i class='fas fa-edit'></i>
                                        </button>
                                        <button class='btn btn-sm btn-danger' onclick='deleteRecord(${r.recordId})' title='Delete'>
                                            <i class='fas fa-trash'></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                        });
                        totalPages = data.totalPages || 1;
                        document.getElementById('pagination-info').textContent = `Page ${currentPage} of ${totalPages}`;
                    } else {
                        tbody.innerHTML = '<tr><td colspan="6">No medical records found.</td></tr>';
                    }
                })
                .catch((error) => {
                    console.error('Error loading medical records:', error);
                    document.getElementById('records-table-body').innerHTML = '<tr><td colspan="6">Failed to load records.</td></tr>';
                });
        }
        function refreshRecords() { loadRecords(); }
        function applyFilters() { loadRecords(); }
        document.getElementById('prevPage').onclick = function() { if (currentPage > 1) { currentPage--; loadRecords(); } };
        document.getElementById('nextPage').onclick = function() { if (currentPage < totalPages) { currentPage++; loadRecords(); } };
        document.addEventListener('DOMContentLoaded', loadRecords);
    </script>
</body>
</html>
